services:
  api:
    build: .
    network_mode: "host"
    depends_on:
      llama-server:
        condition: service_healthy
      alloy:
        condition: service_started
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-http://127.0.0.1:8080}"
      LLM_COMPLETION_ENDPOINT: "${LLM_COMPLETION_ENDPOINT:-/completion}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-180}"
      LLM_MAX_TOKENS: "${LLM_MAX_TOKENS:-256}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      SERVICE_NAME: "${SERVICE_NAME:-document-generation-api}"
      DEPLOYMENT_ENVIRONMENT: "${DEPLOYMENT_ENVIRONMENT:-local}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      APP_LOG_DEBUG_PAYLOADS: "${APP_LOG_DEBUG_PAYLOADS:-false}"
      APP_LOG_FRONTEND_MESSAGES: "${APP_LOG_FRONTEND_MESSAGES:-true}"
      APP_LOG_LLM_RAW: "${APP_LOG_LLM_RAW:-false}"
      APP_LOG_RESPONSE_BODY: "${APP_LOG_RESPONSE_BODY:-true}"
      APP_LOG_MAX_FIELD_LENGTH: "${APP_LOG_MAX_FIELD_LENGTH:-2000}"
      OTEL_ENABLED: "${OTEL_ENABLED:-true}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://127.0.0.1:4318}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    volumes:
      - ./data:/app/data
      - ./generated:/app/generated
    restart: unless-stopped

  llama-server:
    build:
      context: .
      dockerfile: docker/llama.cpp/Dockerfile
      args:
        LLAMA_CPP_REF: "${LLAMA_CPP_REF:-master}"
    environment:
      LLAMA_MODEL_PATH: "${LLAMA_MODEL_PATH:-/models/${LLAMA_MODEL_FILE:-MiniCPM5-1B-Q4_K_M.gguf}}"
      LLAMA_HOST: "0.0.0.0"
      LLAMA_PORT: "8080"
      LLAMA_THREADS: "${LLAMA_THREADS:-1}"
      LLAMA_CONTEXT_SIZE: "${LLAMA_CONTEXT_SIZE:-2048}"
      LLAMA_PARALLEL: "${LLAMA_PARALLEL:-1}"
      LLAMA_MAX_TOKENS: "${LLAMA_MAX_TOKENS:-256}"
      LLAMA_EXTRA_ARGS: "${LLAMA_EXTRA_ARGS:-}"
    volumes:
      - ./models:/models:ro
    ports:
      - "127.0.0.1:${LLAMA_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  grafana-data:
