services:
  api:
    build: .
    network_mode: "host"
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-http://127.0.0.1:8080}"
      LLM_COMPLETION_ENDPOINT: "${LLM_COMPLETION_ENDPOINT:-/completion}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-120}"
      LLM_MAX_TOKENS: "${LLM_MAX_TOKENS:-80}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.4}"
    volumes:
      - ./data:/app/data
      - ./generated:/app/generated
    restart: unless-stopped
