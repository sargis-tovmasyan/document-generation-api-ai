name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        run: |
          git init --quiet .
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --quiet --depth=1 origin $GITHUB_SHA
          git checkout --quiet FETCH_HEAD

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --quiet
          python3 -m pip install flake8 pytest --quiet
          python3 -m pip install -r requirements.txt --quiet

      - name: Lint critical errors
        run: |
          python3 -m flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: |
          python3 -m pytest app/tests -q --tb=short --disable-warnings
